  <style>
/* LIPTAKO — Premium institutional water site */

:root {
  --ink: #0B1F2E;
  --ink-deep: #061320;
  --emerald: #0A5C3A;
  --emerald-2: #0F6E56;
  --gold: #B8860B;
  --gold-2: #D4A84A;
  --cream: #F4EFE6;
  --ice: #E1F5EE;
  --paper: #FBF8F2;
  --line: rgba(11, 31, 46, 0.12);
  --line-light: rgba(255, 255, 255, 0.12);
  --serif: "Cormorant Garamond", "Cormorant", "EB Garamond", Georgia, serif;
  --sans: "Manrope", "Inter", system-ui, -apple-system, sans-serif;
  --mono: "JetBrains Mono", "IBM Plex Mono", ui-monospace, monospace;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  width: 100%;
  background: var(--paper);
  color: var(--ink);
  font-family: var(--sans);
  font-size: 16px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
  scroll-behavior: smooth;
}

img { display: block; max-width: 100%; }

button { font: inherit; color: inherit; background: none; border: none; cursor: pointer; }

a { color: inherit; text-decoration: none; }

::selection { background: var(--gold); color: var(--ink-deep); }

/* Typography ----------------------------------------------------------- */

.eyebrow {
  font-family: var(--sans);
  font-size: 11px;
  letter-spacing: 0.32em;
  text-transform: uppercase;
  font-weight: 600;
  color: var(--gold);
}

.eyebrow.muted { color: rgba(11,31,46,0.55); }
.eyebrow.light { color: rgba(255,255,255,0.62); }

.display {
  font-family: var(--serif);
  font-weight: 300;
  letter-spacing: -0.01em;
  line-height: 0.98;
}

.display em {
  font-style: italic;
  color: var(--gold);
  font-weight: 400;
}

.lede {
  font-family: var(--serif);
  font-weight: 300;
  font-size: 22px;
  line-height: 1.45;
  color: rgba(11,31,46,0.75);
}

.label-vert {
  writing-mode: vertical-rl;
  transform: rotate(180deg);
  font-family: var(--sans);
  font-size: 11px;
  letter-spacing: 0.5em;
  text-transform: uppercase;
}

.divider-gold {
  width: 48px;
  height: 1px;
  background: var(--gold);
  display: block;
}

/* Layout shells -------------------------------------------------------- */

.shell {
  max-width: 1440px;
  margin: 0 auto;
  padding: 0 56px;
}

@media (max-width: 720px) {
  .shell { padding: 0 24px; }
}

/* Nav ----------------------------------------------------------------- */

.nav {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 80;
  padding: 22px 56px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: linear-gradient(to bottom, rgba(6,19,32,0.85), rgba(6,19,32,0));
  transition: background 0.4s ease, padding 0.4s ease, color 0.4s ease;
  color: #fff;
}

.nav.scrolled {
  background: rgba(251, 248, 242, 0.92);
  backdrop-filter: blur(16px) saturate(1.2);
  -webkit-backdrop-filter: blur(16px) saturate(1.2);
  color: var(--ink);
  padding: 14px 56px;
  border-bottom: 1px solid var(--line);
}

.nav .mark {
  display: flex;
  align-items: center;
  gap: 12px;
  font-family: var(--serif);
  font-size: 24px;
  letter-spacing: 0.06em;
  font-weight: 400;
}

.nav .mark .dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--gold);
  box-shadow: 0 0 12px rgba(184,134,11,0.6);
}

.nav ul {
  list-style: none;
  display: flex;
  gap: 36px;
  font-size: 12px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  font-weight: 500;
}

.nav ul a { opacity: 0.78; transition: opacity 0.2s; }
.nav ul a:hover { opacity: 1; }

.nav .actions { display: flex; align-items: center; gap: 14px; }

.btn-pill {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  padding: 12px 22px;
  border-radius: 999px;
  font-size: 12px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  font-weight: 600;
  transition: all 0.25s ease;
  cursor: pointer;
}

.btn-pill.gold {
  background: var(--gold);
  color: var(--ink-deep);
  border: 1px solid var(--gold);
}
.btn-pill.gold:hover { background: var(--gold-2); border-color: var(--gold-2); }

.btn-pill.ghost {
  background: transparent;
  color: inherit;
  border: 1px solid currentColor;
  opacity: 0.85;
}
.btn-pill.ghost:hover { opacity: 1; background: rgba(255,255,255,0.08); }

.nav.scrolled .btn-pill.ghost:hover { background: rgba(11,31,46,0.06); }

@media (max-width: 960px) {
  .nav ul { display: none; }
  .nav { padding: 18px 24px; }
  .nav.scrolled { padding: 12px 24px; }
  .nav .actions .btn-pill.gold { display: none; }
}
@media (max-width: 600px) {
  .nav .actions .btn-pill.ghost { display: none; }
  .sk-trigger span { display: none; }
  .sk-trigger { padding: 8px 10px; }
}

/* Hamburger button */
.nav-burger {
  display: none;
  width: 40px; height: 40px;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 5px;
  background: none;
  border: none;
  cursor: pointer;
  padding: 6px;
  margin-left: 8px;
}
.nav-burger span {
  display: block;
  width: 22px; height: 1.5px;
  background: currentColor;
  transition: transform 0.3s ease, opacity 0.3s ease;
  transform-origin: center;
}
.nav-burger.open span:nth-child(1) { transform: translateY(6.5px) rotate(45deg); }
.nav-burger.open span:nth-child(2) { opacity: 0; }
.nav-burger.open span:nth-child(3) { transform: translateY(-6.5px) rotate(-45deg); }

@media (max-width: 960px) {
  .nav-burger { display: flex; }
}

/* Mobile drawer */
.nav-drawer {
  display: none;
  position: fixed;
  top: 0; right: 0; bottom: 0;
  width: 280px;
  background: rgba(6,19,32,0.97);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  z-index: 79;
  padding: 88px 32px 40px;
  flex-direction: column;
  gap: 8px;
  border-left: 1px solid rgba(255,255,255,0.08);
  transform: translateX(100%);
  transition: transform 0.35s cubic-bezier(0.2, 0.8, 0.2, 1);
}
.nav-drawer.open {
  transform: translateX(0);
}
@media (max-width: 960px) {
  .nav-drawer { display: flex; }
}
.nav-drawer a {
  font-family: var(--sans);
  font-size: 13px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  font-weight: 500;
  color: rgba(255,255,255,0.75);
  padding: 14px 0;
  border-bottom: 1px solid rgba(255,255,255,0.07);
  transition: color 0.2s;
}
.nav-drawer a:hover { color: #fff; }
.nav-drawer .drawer-cta {
  margin-top: 24px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.nav-drawer-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: 78;
  opacity: 0;
  transition: opacity 0.35s ease;
}
.nav-drawer-overlay.open { opacity: 1; }
@media (max-width: 960px) {
  .nav-drawer-overlay { display: block; }
}

/* Hero ---------------------------------------------------------------- */

.hero {
  position: relative;
  min-height: 100vh;
  background: #050b14;
  color: #fff;
  overflow: hidden;
  display: flex;
  align-items: center;
}

.hero::before { content: none; }

.hero-rule {
  position: absolute;
  left: 0; right: 0;
  bottom: 0;
  height: 1px;
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  z-index: 1;
}
.hero-rule span {
  display: block;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(184,134,11,0.35), transparent);
  animation: ruleSlide 6s ease-in-out infinite alternate;
}
.hero-rule span:nth-child(2) { animation-delay: 1s; animation-duration: 7s; }
.hero-rule span:nth-child(3) { animation-delay: 2s; animation-duration: 8s; }
@keyframes ruleSlide {
  0% { transform: translateX(-10%); opacity: 0.4; }
  100% { transform: translateX(10%); opacity: 1; }
}

.hero-grain {
  position: absolute; inset: 0;
  background-image:
    repeating-linear-gradient(45deg, rgba(255,255,255,0.02) 0 1px, transparent 1px 4px);
  pointer-events: none;
  mix-blend-mode: overlay;
}

.hero-grid {
  position: relative;
  z-index: 2;
  display: grid;
  grid-template-columns: 1.1fr 1fr;
  gap: 40px;
  width: 100%;
  align-items: center;
  padding: 140px 56px 80px;
  max-width: 1440px;
  margin: 0 auto;
}

.hero h1 {
  font-family: var(--serif);
  font-weight: 300;
  font-size: clamp(48px, 7vw, 104px);
  line-height: 0.96;
  letter-spacing: -0.015em;
}
.hero h1 em {
  font-style: italic;
  color: var(--gold);
  font-weight: 400;
}

.hero .sub {
  font-size: 18px;
  line-height: 1.55;
  color: rgba(255,255,255,0.78);
  max-width: 480px;
  margin-top: 28px;
  font-weight: 300;
}

.hero .cta-row {
  margin-top: 44px;
  display: flex;
  gap: 14px;
  flex-wrap: wrap;
}

.hero .meta {
  position: absolute;
  bottom: 32px;
  left: 56px;
  right: 56px;
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  z-index: 2;
  color: rgba(255,255,255,0.55);
  font-size: 11px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
}

.hero .scroll-cue {
  display: flex;
  align-items: center;
  gap: 10px;
}
.hero .scroll-cue .line {
  width: 1px; height: 36px;
  background: linear-gradient(to bottom, var(--gold), transparent);
  position: relative; overflow: hidden;
}
.hero .scroll-cue .line::after {
  content: ""; position: absolute; left: 0; top: -100%;
  width: 1px; height: 100%;
  background: var(--gold);
  animation: scrollDown 2.4s ease-in-out infinite;
}
@keyframes scrollDown {
  0% { top: -100%; }
  100% { top: 100%; }
}

.hero-eyebrow {
  display: flex;
  align-items: center;
  gap: 14px;
  margin-bottom: 30px;
}
.hero-eyebrow span { color: rgba(255,255,255,0.65); font-size: 11px; letter-spacing: 0.32em; text-transform: uppercase; font-weight: 600; }
.hero-eyebrow .l { width: 32px; height: 1px; background: var(--gold); }

/* Bottle stage */

.bottle-stage {
  position: relative;
  height: clamp(520px, 70vh, 720px);
  display: flex;
  align-items: center;
  justify-content: center;
}

.bottle-stage .halo {
  position: absolute;
  inset: 0;
  background: radial-gradient(circle at 50% 45%, rgba(225,245,238,0.18) 0%, transparent 55%);
  filter: blur(20px);
}

.bottle-stage img.bottle {
  position: relative;
  height: 100%;
  width: auto;
  object-fit: contain;
  filter: drop-shadow(0 60px 80px rgba(0,0,0,0.55)) drop-shadow(0 0 40px rgba(225,245,238,0.06));
  animation: float 7s ease-in-out infinite;
  z-index: 2;
}

@keyframes float {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-14px); }
}

.bottle-stage .gold-ring {
  position: absolute;
  width: 380px;
  height: 380px;
  border: 1px solid rgba(184,134,11,0.4);
  border-radius: 50%;
  animation: spin 60s linear infinite;
}
.bottle-stage .gold-ring::before, .bottle-stage .gold-ring::after {
  content: ""; position: absolute; inset: 18px;
  border-radius: 50%;
  border: 1px solid rgba(184,134,11,0.18);
}
.bottle-stage .gold-ring::after { inset: 38px; border-color: rgba(184,134,11,0.10); }

@keyframes spin { to { transform: rotate(360deg); } }

.bottle-stage .ring-label {
  position: absolute;
  top: -8px; left: 50%; transform: translateX(-50%);
  background: var(--ink-deep);
  padding: 4px 12px;
  font-size: 9px;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: var(--gold);
}

.bottle-stage .float-pill {
  position: absolute;
  font-size: 10px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.78);
  padding: 7px 14px;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.14);
  border-radius: 999px;
  backdrop-filter: blur(8px);
}

.bottle-stage .float-pill .dot {
  display: inline-block; width: 5px; height: 5px;
  border-radius: 50%; margin-right: 8px;
  background: var(--gold);
  box-shadow: 0 0 8px var(--gold);
}

@media (max-width: 960px) {
  .hero-grid { grid-template-columns: 1fr; padding: 120px 24px 60px; gap: 0; }
  .bottle-stage { height: 380px; margin-top: 24px; }
  .bottle-stage .gold-ring { width: 280px; height: 280px; }
  .hero .meta { left: 24px; right: 24px; }
}

/* Section base -------------------------------------------------------- */

section {
  position: relative;
  padding: 140px 0;
}

.section-head {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  gap: 60px;
  margin-bottom: 72px;
}

.section-head h2 {
  font-family: var(--serif);
  font-weight: 300;
  font-size: clamp(40px, 5vw, 72px);
  line-height: 1.0;
  max-width: 760px;
  letter-spacing: -0.01em;
}

.section-head h2 em { font-style: italic; color: var(--gold); }

.section-head .right {
  text-align: right;
  max-width: 320px;
  font-size: 14px;
  line-height: 1.6;
  color: rgba(11,31,46,0.65);
  flex-shrink: 0;
}

.section-head .right .idx {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.18em;
  color: var(--gold);
  margin-bottom: 14px;
  display: block;
}

@media (max-width: 880px) {
  .section-head { flex-direction: column; align-items: flex-start; gap: 24px; }
  .section-head .right { text-align: left; max-width: none; }
  section { padding: 96px 0; }
}

/* Manifeste ----------------------------------------------------------- */

.manifeste {
  background: var(--paper);
  color: var(--ink);
  border-top: 1px solid var(--line);
  border-bottom: 1px solid var(--line);
}

.manifeste-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 80px;
  align-items: center;
}

.manifeste-grid p {
  font-family: var(--serif);
  font-weight: 300;
  font-size: 26px;
  line-height: 1.45;
  color: rgba(11,31,46,0.8);
}

.manifeste-grid p + p { margin-top: 28px; }

.manifeste-grid p em { font-style: italic; color: var(--emerald); }

.manifeste-stats {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1px;
  background: var(--line);
  border: 1px solid var(--line);
}

.stat {
  background: var(--paper);
  padding: 40px 32px;
}

.stat .num {
  font-family: var(--serif);
  font-weight: 300;
  font-size: 72px;
  line-height: 1;
  letter-spacing: -0.02em;
  color: var(--emerald);
}

.stat .num sup { font-size: 22px; vertical-align: top; color: var(--gold); margin-left: 4px; }

.stat .label {
  margin-top: 14px;
  font-size: 11px;
  letter-spacing: 0.24em;
  text-transform: uppercase;
  color: rgba(11,31,46,0.6);
}

.stat .desc {
  margin-top: 6px;
  font-size: 13px;
  color: rgba(11,31,46,0.7);
  line-height: 1.5;
}

@media (max-width: 880px) {
  .manifeste-grid { grid-template-columns: 1fr; gap: 56px; }
}

/* Storytelling ------------------------------------------------------- */

.chapters {
  background: var(--ink-deep);
  color: #fff;
  padding: 160px 0 120px;
}

.chapters .section-head h2 { color: #fff; }
.chapters .section-head .right { color: rgba(255,255,255,0.6); }

.chapter {
  display: grid;
  grid-template-columns: 80px 1fr 1.2fr;
  gap: 48px;
  padding: 56px 0;
  border-top: 1px solid rgba(255,255,255,0.08);
  align-items: center;
}
.chapter:last-child { border-bottom: 1px solid rgba(255,255,255,0.08); }

.chapter .num {
  font-family: var(--mono);
  font-size: 12px;
  letter-spacing: 0.2em;
  color: var(--gold);
}

.chapter .title {
  font-family: var(--serif);
  font-weight: 300;
  font-size: clamp(28px, 3.4vw, 48px);
  line-height: 1.05;
}

.chapter .desc {
  color: rgba(255,255,255,0.7);
  font-size: 15px;
  line-height: 1.65;
  max-width: 520px;
}

.chapter .desc small {
  display: block;
  margin-top: 14px;
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.18em;
  color: rgba(255,255,255,0.45);
  text-transform: uppercase;
}

@media (max-width: 880px) {
  .chapter { grid-template-columns: 60px 1fr; }
  .chapter .desc { grid-column: 2; }
}

/* Configurator ------------------------------------------------------- */

.configurator {
  background: linear-gradient(180deg, #f7f3ea 0%, #ece6d8 100%);
  position: relative;
  overflow: hidden;
}

.configurator::before {
  content: "";
  position: absolute;
  top: -200px; right: -200px;
  width: 600px; height: 600px;
  background: radial-gradient(circle, rgba(184,134,11,0.18), transparent 60%);
  pointer-events: none;
}

.config-grid {
  display: grid;
  grid-template-columns: 1fr 1.05fr 1fr;
  gap: 48px;
  align-items: stretch;
  background: var(--paper);
  border: 1px solid var(--line);
  border-radius: 2px;
  padding: 56px;
  box-shadow: 0 80px 120px -40px rgba(11,31,46,0.18);
}

.config-section h4 {
  font-family: var(--sans);
  font-weight: 600;
  font-size: 11px;
  letter-spacing: 0.28em;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 14px;
}

.config-section .helper {
  font-size: 13px;
  color: rgba(11,31,46,0.6);
  margin-bottom: 22px;
  line-height: 1.5;
}

.option-stack {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.option {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 16px;
  border: 1px solid var(--line);
  background: #fff;
  cursor: pointer;
  transition: all 0.18s ease;
}
.option:hover { border-color: var(--gold); }
.option.active {
  border-color: var(--emerald);
  background: var(--ice);
  box-shadow: inset 3px 0 0 var(--emerald);
}

.option .name {
  font-size: 14px;
  font-weight: 500;
}
.option .sub {
  font-size: 11px;
  color: rgba(11,31,46,0.55);
  margin-top: 2px;
  letter-spacing: 0.04em;
}
.option .meta {
  font-family: var(--mono);
  font-size: 11px;
  color: rgba(11,31,46,0.5);
  letter-spacing: 0.05em;
}

.swatch-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
}
.swatch {
  aspect-ratio: 1;
  border-radius: 4px;
  cursor: pointer;
  border: 2px solid transparent;
  position: relative;
  transition: transform 0.2s;
}
.swatch:hover { transform: scale(1.05); }
.swatch.active {
  border-color: var(--ink);
  box-shadow: 0 0 0 2px var(--paper), 0 0 0 3px var(--ink);
}
.swatch .label {
  position: absolute;
  bottom: -22px;
  left: 0; right: 0;
  text-align: center;
  font-size: 9px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: rgba(11,31,46,0.55);
}

.config-preview {
  background: linear-gradient(180deg, #061320 0%, #0b2536 100%);
  border-radius: 2px;
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
  overflow: hidden;
  min-height: 480px;
}

.config-preview::before {
  content: "";
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse at center, rgba(225,245,238,0.10), transparent 60%);
}

.config-preview .stage-grid {
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(rgba(255,255,255,0.05) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.05) 1px, transparent 1px);
  background-size: 40px 40px;
}

.config-preview img {
  position: relative;
  z-index: 2;
  max-height: 540px;
  width: auto;
  filter: drop-shadow(0 40px 60px rgba(0,0,0,0.5));
  transition: opacity 0.4s ease;
}

.config-preview .hud {
  position: absolute;
  top: 16px; left: 16px; right: 16px;
  display: flex;
  justify-content: space-between;
  font-family: var(--mono);
  font-size: 10px;
  color: rgba(255,255,255,0.5);
  letter-spacing: 0.18em;
  text-transform: uppercase;
  z-index: 3;
}

.config-preview .hud .red { color: #f56565; }

.config-preview .footnote {
  position: absolute;
  bottom: 16px; left: 16px; right: 16px;
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  z-index: 3;
}

.config-preview .footnote .name {
  font-family: var(--serif);
  font-size: 22px;
  font-weight: 300;
  color: #fff;
}
.config-preview .footnote .ref {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.2em;
  color: var(--gold);
  text-transform: uppercase;
}

.config-summary {
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.summary-row {
  display: flex;
  justify-content: space-between;
  padding: 12px 0;
  border-bottom: 1px dashed var(--line);
  font-size: 13px;
}
.summary-row .k {
  font-size: 11px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: rgba(11,31,46,0.55);
}
.summary-row .v { font-weight: 600; }

.summary-cta {
  margin-top: 12px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.btn-block {
  width: 100%;
  padding: 16px;
  text-align: center;
  font-size: 12px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  font-weight: 600;
  transition: all 0.2s ease;
  cursor: pointer;
  border: 1px solid transparent;
}
.btn-block.solid {
  background: var(--ink);
  color: #fff;
}
.btn-block.solid:hover { background: var(--emerald); }
.btn-block.ghost {
  background: transparent;
  border-color: var(--ink);
  color: var(--ink);
}
.btn-block.ghost:hover { background: var(--ink); color: #fff; }

@media (max-width: 1100px) {
  .config-grid { grid-template-columns: 1fr; padding: 32px; }
  .config-preview { min-height: 360px; }
  .config-preview img { max-height: 360px; }
}

/* Institutional ------------------------------------------------------ */

.institutional {
  background: var(--paper);
  transition: background 0.6s ease, color 0.6s ease;
}

.inst-tabs {
  display: flex;
  gap: 32px;

}

.inst-tab {
  padding: 18px 4px;

  letter-spacing: 0.22em;
  text-transform: uppercase;
  font-weight: 600;

.inst-copy h3 {

.inst-copy .signature {

.inst-copy .desc {

.inst-pillars {

}

.pillar {

}
.pillar .num {

}
.pillar h5 {

.pillar p {

.inst-bottle {

}

.inst-bottle img {

.inst-bottle .vert-label {

@media (max-width: 1000px) {

/* Products gallery --------------------------------------------------- */

.gammes {

}
.gammes .section-head h2 { color: #fff; }
.gammes .section-head .right { color: rgba(255,255,255,0.55); }

.gamme-grid {

.gamme {

.gamme h4 {

.gamme .vol {

.gamme .desc {

.gamme .meta-row {

.gamme .price {

.gamme .price small {

  .gamme-grid { grid-template-columns: 1fr 1fr; }
}
@media (max-width: 620px) {
  .gamme-grid { grid-template-columns: 1fr; }

/* Niger story ------------------------------------------------------- */

.niger {
  background: var(--paper);
  position: relative;
  overflow: hidden;
}

.niger-marquee {
  font-family: var(--serif);
  font-weight: 300;
  font-style: italic;
  font-size: clamp(80px, 12vw, 180px);
  line-height: 0.95;
  letter-spacing: -0.02em;
  white-space: nowrap;
  display: flex;
  gap: 80px;
  margin-bottom: 60px;

}
.niger-marquee em { color: var(--gold); font-style: italic; }

.niger-grid {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 4px;
}

.niger-card {
  position: relative;
  aspect-ratio: 4/5;
  overflow: hidden;
  background: var(--ink);
  color: #fff;
}

.niger-card.tall { grid-row: span 2; aspect-ratio: 4/9; }
.niger-card.wide { grid-column: span 2; aspect-ratio: 8/5; }

.niger-card .ph {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  background-image: repeating-linear-gradient(135deg, rgba(255,255,255,0.04) 0 1px, transparent 1px 14px);
}

.niger-card .ph .center {
  font-family: var(--mono);
  font-size: 10px;

  text-transform: uppercase;

}

.niger-card .meta {
  position: absolute;
  bottom: 20px;
  left: 20px;
  right: 20px;

  justify-content: space-between;
  align-items: flex-end;
}

.niger-card .meta .ttl {
  font-family: var(--serif);
  font-weight: 300;
  font-size: 24px;
  line-height: 1.05;
}
.niger-card .meta .num {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.22em;
  color: var(--gold);
}

.niger-card.sahel { background: linear-gradient(135deg, #c19a4a, #8b6520); }
.niger-card.fleuve { background: linear-gradient(180deg, #0a5c3a, #0b1f2e); }
.niger-card.dunes { background: linear-gradient(180deg, #d9b075 0%, #7a4e1b 100%); }
.niger-card.archi { background: linear-gradient(180deg, #4a5e6e 0%, #1a2a36 100%); }
.niger-card.jeunesse { background: linear-gradient(135deg, #1B3A5C, #0b1f2e); }

@media (max-width: 760px) {
  .niger-grid { grid-template-columns: 1fr 1fr; }

/* Trust / Partners -------------------------------------------------- */

.trust {
  background: var(--ink-deep);

}
.trust .section-head h2 { color: #fff; }

.trust-stat {

}

.trust-stat .num {

.trust-stat .num sup {

.trust-stat .lab {

.partner-grid {

.partner .cat {

/* CTA strip -------------------------------------------------------- */

.cta-strip {

}
.cta-strip::before {

.cta-strip .inner {

.cta-strip h2 {

.cta-strip .right {

/* Concierge floater --------------------------------------------------- */

.concierge {
  position: fixed;
  bottom: 24px;
  right: 24px;
  z-index: 90;
}

.concierge-btn {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 14px 22px 14px 16px;
  background: var(--ink);
  color: #fff;
  border-radius: 999px;
  font-size: 12px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  font-weight: 600;
  cursor: pointer;
  box-shadow: 0 20px 40px rgba(0,0,0,0.3);
  border: 1px solid var(--gold);
  transition: transform 0.2s;
}
.concierge-btn:hover { transform: translateY(-2px); }

.concierge-btn .pulse {
  width: 10px; height: 10px;
  border-radius: 50%;
  background: var(--gold);
  position: relative;
}
.concierge-btn .pulse::after {
  content: "";
  position: absolute; inset: -4px;
  border-radius: 50%;
  border: 1px solid var(--gold);
  opacity: 0.6;
  animation: pulse 1.8s ease-out infinite;
}
@keyframes pulse {
  0% { transform: scale(0.8); opacity: 0.8; }
  100% { transform: scale(2); opacity: 0; }
}

.concierge-panel {
  position: absolute;
  bottom: 70px;
  right: 0;
  width: 380px;
  max-width: calc(100vw - 48px);
  background: var(--ink);
  color: #fff;
  border: 1px solid rgba(255,255,255,0.12);
  box-shadow: 0 40px 80px rgba(0,0,0,0.45);
  border-radius: 4px;
  overflow: hidden;
  transform-origin: bottom right;
  animation: panelIn 0.25s ease-out;
}
@keyframes panelIn {
  from { opacity: 0; transform: translateY(8px) scale(0.96); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}

.concierge-panel .head {
  padding: 22px;
  border-bottom: 1px solid rgba(255,255,255,0.10);
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.concierge-panel .head .ttl {
  font-family: var(--serif);
  font-size: 22px;
  font-weight: 300;
}
.concierge-panel .head .ttl em { color: var(--gold); font-style: italic; }
.concierge-panel .head .status {
  font-size: 10px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.5);
  display: flex; align-items: center; gap: 6px;
}
.concierge-panel .head .status .live {
  width: 6px; height: 6px; border-radius: 50%;
  background: #4ade80; box-shadow: 0 0 6px #4ade80;
}

.concierge-panel .body {
  padding: 22px;
  max-height: 320px;
  overflow-y: auto;
}

.bubble {
  padding: 12px 14px;
  border-radius: 12px;
  font-size: 13px;
  line-height: 1.5;
  margin-bottom: 10px;
  max-width: 88%;
}
.bubble.ai {
  background: rgba(255,255,255,0.08);
  border-bottom-left-radius: 2px;
}
.bubble.me {
  background: var(--gold);
  color: var(--ink-deep);
  margin-left: auto;
  border-bottom-right-radius: 2px;
  font-weight: 500;
}

.quick {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-top: 8px;
}
.quick button {
  font-size: 11px;
  padding: 7px 12px;
  border-radius: 999px;
  border: 1px solid rgba(255,255,255,0.18);
  color: rgba(255,255,255,0.8);
  cursor: pointer;
  transition: all 0.15s;
}
.quick button:hover { background: var(--gold); color: var(--ink-deep); border-color: var(--gold); }

.concierge-panel .foot {
  padding: 12px 16px;
  border-top: 1px solid rgba(255,255,255,0.10);
  font-size: 10px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.4);
  display: flex;
  justify-content: space-between;
}

/* Tweaks panel-friendly utility */
.hidden { display: none !important; }

/* fade-in on scroll */
.reveal {
  opacity: 0;
  transform: translateY(24px);
  transition: opacity 0.9s ease, transform 0.9s ease;
}
.reveal.in {
  opacity: 1;
  transform: translateY(0);
}

   v2 ADDITIONS — image blend, tilt, waves, modal, magnetic, cursor
   ==================================================================== */

/* Scroll progress bar */
.scroll-progress {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: 2px;
  z-index: 100;
  background: rgba(255,255,255,0.05);
  pointer-events: none;
}
.scroll-progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--gold), var(--emerald-2));
  transition: width 0.1s linear;
  box-shadow: 0 0 12px rgba(184,134,11,0.6);
}

/* Custom cursor */
.cursor-dot, .cursor-ring {
  position: fixed;
  top: 0; left: 0;
  pointer-events: none;
  z-index: 9999;
  border-radius: 50%;
  transform: translate(-50%, -50%);
  mix-blend-mode: difference;
  will-change: transform;
}
.cursor-dot {
  width: 6px; height: 6px;
  background: #fff;
  margin-left: -3px; margin-top: -3px;
}
.cursor-ring {
  width: 36px; height: 36px;
  border: 1px solid rgba(255,255,255,0.4);
  margin-left: -18px; margin-top: -18px;
  transition: width 0.2s, height 0.2s, margin 0.2s, border-color 0.2s;
}
.cursor-ring.hover {
  width: 60px; height: 60px;
  margin-left: -30px; margin-top: -30px;
  border-color: var(--gold);
}
@media (pointer: coarse) {
  .cursor-dot, .cursor-ring { display: none; }
}

/* Hero waves + parallax bottle */
.hero-waves {
  position: absolute;
  left: 0; right: 0; bottom: 0;
  height: 240px;
  z-index: 1;
  pointer-events: none;
}
.hero-waves svg { width: 100%; height: 100%; display: block; }
.hero-waves .wave {
  animation: waveSlide 14s ease-in-out infinite alternate;
  transform-origin: center;
}
.hero-waves .wave.w2 { animation-duration: 18s; animation-direction: alternate-reverse; }
.hero-waves .wave.w3 { animation-duration: 22s; }
@keyframes waveSlide {
  0% { transform: translateX(-2%) scaleY(1); }
  100% { transform: translateX(2%) scaleY(1.05); }
}

.hero-trust {
  margin-top: 36px;
  display: flex;
  gap: 22px;
  flex-wrap: wrap;
  font-size: 11px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.55);
}
.hero-trust .ht-item { display: flex; align-items: center; gap: 8px; }
.hero-trust .dot { width: 5px; height: 5px; border-radius: 50%; background: rgba(225,245,238,0.5); }
.hero-trust .dot.gold { background: var(--gold); box-shadow: 0 0 8px var(--gold); }

.bottle-stage {
  transition: transform 0.4s cubic-bezier(0.2, 0.7, 0.2, 1);
  transform-style: preserve-3d;
  will-change: transform;
}

.bottle-frame {
  position: relative;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 2;
  transform-style: preserve-3d;
}

/* Blend bottle JPEG into dark hero — mask + glow */
.bottle-stage img.bottle {
  height: 100%;
  width: auto;
  max-width: 100%;
  object-fit: contain;
  border-radius: 6px;
  filter:
    drop-shadow(0 60px 80px rgba(0,0,0,0.55))
    drop-shadow(0 0 60px rgba(225,245,238,0.08));
  -webkit-mask-image: radial-gradient(ellipse 80% 90% at 50% 50%, #000 60%, transparent 100%);
          mask-image: radial-gradient(ellipse 80% 90% at 50% 50%, #000 60%, transparent 100%);
  mix-blend-mode: lighten;
  opacity: 0.95;
  transform: translateZ(40px);
  animation: none;
}

.bottle-frame {
  animation: float 7s ease-in-out infinite;
}

.bottle-glare {
  position: absolute; inset: 0;
  background: radial-gradient(circle at var(--glare-x, 50%) var(--glare-y, 50%), rgba(255,255,255,0.18), transparent 40%);
  pointer-events: none;
  opacity: var(--glare-o, 0);
  transition: opacity 0.3s;
  border-radius: 6px;
  mix-blend-mode: overlay;
}

.float-pill { transition: transform 0.5s ease; }
.float-pill.p-1 { top: 8%; left: 0%; animation: floatPill 5s 0.0s ease-in-out infinite alternate; }
.float-pill.p-2 { top: 48%; right: -2%; animation: floatPill 6s 0.7s ease-in-out infinite alternate; }
.float-pill.p-3 { bottom: 8%; left: 6%; animation: floatPill 7s 1.2s ease-in-out infinite alternate; }
@keyframes floatPill {
  0% { transform: translateY(0); }
  100% { transform: translateY(-8px); }
}

/* Hero h1 split entrance */
.split-in span {
  display: block;
  opacity: 0;
  transform: translateY(40px) rotateX(-30deg);
  animation: splitIn 1s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
  transform-origin: 50% 100%;
}
.split-in span:nth-child(1) { animation-delay: 0.6s; }
.split-in span:nth-child(2) { animation-delay: 0.75s; }
.split-in span:nth-child(3) { animation-delay: 0.9s; }
@keyframes splitIn {
  to { opacity: 1; transform: translateY(0) rotateX(0); }
}

/* Magnetic buttons */
.magnet { transition: transform 0.25s cubic-bezier(0.2, 0.7, 0.2, 1); will-change: transform; }

.btn-pill .arrow-i {
  display: inline-block;
  transition: transform 0.3s;
}
.btn-pill:hover .arrow-i { transform: translateX(4px); }

.btn-pill.ghost.dark {
  border-color: var(--ink);
  color: var(--ink);
}
.btn-pill.ghost.dark:hover { background: var(--ink); color: #fff; }

.manifeste-cta { margin-top: 36px; }
.chapters-cta, .gammes-cta { margin-top: 64px; display: flex; justify-content: center; }

/* Institutional v2 — full-bleed poster with tilt */
.institutional { position: relative; padding: 160px 0; overflow: hidden; }

.inst-bg-glow {
  position: absolute;
  inset: 0;
  pointer-events: none;
  transition: background 0.8s ease;
}

.inst-layout {
  display: grid;
  grid-template-columns: 1fr 1.1fr;
  gap: 80px;
  align-items: center;
  margin-bottom: 80px;
  position: relative;
  z-index: 1;
}

.poster-stage {
  perspective: 1400px;
  display: flex;
  justify-content: center;
  align-items: center;
}

.poster {
  position: relative;
  width: 100%;
  max-width: 520px;
  aspect-ratio: 2/3;
  border-radius: 8px;
  overflow: hidden;
  cursor: zoom-in;
  box-shadow:
    0 50px 80px rgba(11,31,46,0.35),
    0 20px 40px rgba(11,31,46,0.25),
    0 0 0 1px rgba(255,255,255,0.05);
  transition: transform 0.5s cubic-bezier(0.2, 0.7, 0.2, 1), box-shadow 0.5s;
  will-change: transform;
  transform-style: preserve-3d;
  background: var(--ink-deep);
}

.poster img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
  transform: translateZ(0);
}

.poster-glare {
  position: absolute;
  inset: 0;
  pointer-events: none;
  background: radial-gradient(circle at var(--glare-x, 50%) var(--glare-y, 50%), rgba(255,255,255,0.4), transparent 35%);
  mix-blend-mode: overlay;
  opacity: var(--glare-o, 0);
  transition: opacity 0.3s;
}

.poster-corner {
  position: absolute;
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 0.22em;
  color: rgba(255,255,255,0.6);
  background: rgba(0,0,0,0.45);
  backdrop-filter: blur(6px);
  padding: 5px 9px;
  border-radius: 2px;
  pointer-events: none;
  z-index: 3;
}
.poster-corner.tl { top: 16px; left: 16px; }
.poster-corner.tr { top: 16px; right: 16px; }
.poster-corner.bl { bottom: 16px; left: 16px; }
.poster-corner.br { bottom: 16px; right: 16px; }

.poster-zoom {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 56px; height: 56px;
  border-radius: 50%;
  background: rgba(0,0,0,0.5);
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  backdrop-filter: blur(8px);
  opacity: 0;
  transition: opacity 0.3s, transform 0.3s;
  z-index: 4;
}
.poster:hover .poster-zoom { opacity: 1; }

.inst-thumbs {
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  gap: 12px;
  position: relative;
  z-index: 1;
}
.thumb {
  position: relative;
  padding: 0;
  border-radius: 4px;
  overflow: hidden;
  background: none;
  border: 2px solid transparent;
  transition: transform 0.25s, border-color 0.25s;
  aspect-ratio: 2/3;
}
.thumb:hover { transform: translateY(-4px); }
.thumb.active { transform: scale(1.04); }
.thumb img {
  width: 100%; height: 100%;
  object-fit: cover;
  display: block;
  filter: saturate(0.85) brightness(0.9);
  transition: filter 0.3s;
}
.thumb:hover img, .thumb.active img { filter: saturate(1) brightness(1); }

.thumb-cap {
  position: absolute;
  left: 0; right: 0; bottom: 0;
  padding: 8px 10px;
  font-size: 9px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  font-weight: 600;
  text-align: center;
  backdrop-filter: blur(4px);
}

.inst-actions {
  display: flex;
  gap: 12px;
  margin-top: 36px;
  flex-wrap: wrap;
}

.btn-pill.solid-acc {
  border: 1px solid transparent;
  font-weight: 700;
}
.btn-pill.solid-acc:hover {
  filter: brightness(1.1);
}

@media (max-width: 1000px) {
  .inst-layout { grid-template-columns: 1fr; }
  .inst-thumbs { grid-template-columns: repeat(4, 1fr); }
  .poster { max-width: 360px; margin: 0 auto; }
}
@media (max-width: 640px) {
  .inst-thumbs { grid-template-columns: repeat(3, 1fr); }
  /* Scale down bot on very small screens */
  .lbot-wrap { bottom: 80px; right: 16px; }
  .lbot { transform-origin: bottom right; }
  .lbot-head { width: 64px; height: 54px; border-radius: 14px; }
  .lbot-bubble { max-width: 180px; font-size: 12px; }
  .concierge { bottom: 16px; right: 16px; }
  .concierge-btn { padding: 11px 16px 11px 12px; font-size: 11px; }
}

/* Poster lightbox */
.poster-lightbox {
  position: fixed;
  inset: 0;
  background: rgba(3,8,15,0.94);
  z-index: 300;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 40px;
  animation: fadeIn 0.3s ease;
  cursor: zoom-out;
}
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
.poster-lightbox img {
  max-height: 92vh;
  max-width: 92vw;
  width: auto;
  height: auto;
  box-shadow: 0 60px 120px rgba(0,0,0,0.6);
  border-radius: 8px;
  animation: zoomIn 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
}
@keyframes zoomIn { from { opacity: 0; transform: scale(0.92); } to { opacity: 1; transform: scale(1); } }

.lb-close {
  position: absolute;
  top: 24px; right: 24px;
  width: 48px; height: 48px;
  border-radius: 50%;
  background: rgba(255,255,255,0.08);
  color: #fff;
  font-size: 16px;
  border: 1px solid rgba(255,255,255,0.18);
  cursor: pointer;
}
.lb-close:hover { background: var(--gold); color: var(--ink-deep); border-color: var(--gold); }

.lb-meta {
  position: absolute;
  bottom: 32px; left: 32px;
  color: #fff;
}
.lb-eye {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.24em;
  color: var(--gold);
}
.lb-name {
  font-family: var(--serif);
  font-size: 32px;
  font-weight: 300;
  margin-top: 6px;
}

/* Gamme tilt + glare */
.gamme {
  transform-style: preserve-3d;
  transition: transform 0.4s cubic-bezier(0.2, 0.7, 0.2, 1), background 0.4s ease;
  will-change: transform;
  position: relative;
}
.gamme-glare {
  position: absolute;
  inset: 0;
  background: radial-gradient(circle at var(--glare-x, 50%) var(--glare-y, 50%), rgba(255,255,255,0.20), transparent 40%);
  pointer-events: none;
  opacity: var(--glare-o, 0);
  transition: opacity 0.3s;
  mix-blend-mode: overlay;
}

.gamme img {
  -webkit-mask-image: radial-gradient(ellipse 75% 90% at 50% 50%, #000 55%, transparent 100%);
          mask-image: radial-gradient(ellipse 75% 90% at 50% 50%, #000 55%, transparent 100%);
  mix-blend-mode: lighten;
  filter: drop-shadow(0 20px 40px rgba(0,0,0,0.5)) brightness(1.05);
}

.gamme .arrow {
  cursor: pointer;
  color: #fff;
}

/* CTA strip orbs */
.cta-bg-anim { position: absolute; inset: 0; pointer-events: none; overflow: hidden; }
.orb {
  position: absolute;
  border-radius: 50%;
  filter: blur(60px);
  opacity: 0.5;
  animation: orbDrift 16s ease-in-out infinite alternate;
}
.orb.o1 { width: 400px; height: 400px; background: var(--gold); top: -120px; left: 10%; }
.orb.o2 { width: 500px; height: 500px; background: var(--emerald-2); bottom: -200px; right: 5%; animation-duration: 22s; animation-direction: alternate-reverse; }
.orb.o3 { width: 300px; height: 300px; background: rgba(225,245,238,0.6); top: 30%; right: 30%; animation-duration: 26s; }
@keyframes orbDrift {
  0% { transform: translate(0,0); }
  100% { transform: translate(40px, -30px); }
}

/* Partner button */
.partner {
  text-align: left;
  font: inherit;
  color: inherit;
  cursor: pointer;
}
.partner-go {
  margin-top: auto;
  font-size: 10px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.4);
  transition: color 0.2s;
}
.partner:hover .partner-go { color: var(--gold); }

/* ===========  MODAL  =========== */

.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(3,8,15,0.85);
  backdrop-filter: blur(12px) saturate(1.2);
  z-index: 250;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
  animation: fadeIn 0.25s ease;
}

.modal-shell {
  width: 100%;
  max-width: 980px;
  background: var(--paper);
  border-radius: 6px;
  overflow: hidden;
  display: grid;
  grid-template-columns: 0.85fr 1fr;
  box-shadow: 0 60px 120px rgba(0,0,0,0.5);
  animation: modalIn 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
  position: relative;
  max-height: 92vh;
}
@keyframes modalIn {
  from { opacity: 0; transform: translateY(20px) scale(0.97); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}

.modal-close {
  position: absolute;
  top: 16px; right: 16px;
  width: 36px; height: 36px;
  border-radius: 50%;
  background: rgba(255,255,255,0.1);
  color: rgba(255,255,255,0.9);
  font-size: 13px;
  z-index: 3;
  transition: all 0.2s;
}
.modal-close:hover { background: var(--gold); color: var(--ink-deep); }

.modal-side {
  background: linear-gradient(180deg, var(--ink) 0%, var(--ink-deep) 100%);
  color: #fff;
  padding: 48px 40px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  gap: 32px;
  position: relative;
  overflow: hidden;
}
.modal-side::before {
  content: "";
  position: absolute;
  top: -100px; right: -100px;
  width: 300px; height: 300px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(184,134,11,0.3), transparent 60%);
}

.modal-mark {
  font-family: var(--serif);
  font-size: 28px;
  letter-spacing: 0.06em;
  font-weight: 300;
}
.modal-mark em { color: var(--gold); font-style: italic; }

.modal-eyebrow {
  font-size: 10px;
  letter-spacing: 0.28em;
  text-transform: uppercase;
  color: var(--gold);
  font-weight: 600;
  margin-bottom: 16px;
}
.modal-title {
  font-family: var(--serif);
  font-weight: 300;
  font-size: 40px;
  line-height: 1.05;
  margin-bottom: 16px;
  letter-spacing: -0.01em;
}
.modal-sub {
  font-size: 14px;
  line-height: 1.55;
  color: rgba(255,255,255,0.7);
}

.modal-meta {
  border-top: 1px solid rgba(255,255,255,0.1);
  padding-top: 20px;
  font-size: 11px;
  letter-spacing: 0.18em;
  display: flex;
  flex-direction: column;
  gap: 10px;
  color: rgba(255,255,255,0.55);
  text-transform: uppercase;
  position: relative;
  z-index: 1;
}
.modal-meta .row { display: flex; justify-content: space-between; gap: 12px; }
.modal-meta .v { color: var(--gold); font-family: var(--mono); }

.modal-form-wrap {
  padding: 48px 40px;
  background: var(--paper);
  overflow-y: auto;
}

.modal-form { display: flex; flex-direction: column; gap: 16px; }
.modal-form .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.modal-form label { display: flex; flex-direction: column; gap: 6px; }
.modal-form label span {
  font-size: 10px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: rgba(11,31,46,0.55);
  font-weight: 600;
}
.modal-form input, .modal-form textarea, .modal-form select {
  padding: 12px 14px;
  border: 1px solid var(--line);
  background: #fff;
  font: inherit;
  font-size: 14px;
  color: var(--ink);
  border-radius: 2px;
  transition: all 0.2s;
}
.modal-form input:focus, .modal-form textarea:focus, .modal-form select:focus {
  outline: none;
  border-color: var(--ink);
  box-shadow: inset 3px 0 0 var(--gold);
}

.form-cta { display: grid; grid-template-columns: 1fr 1.4fr; gap: 12px; margin-top: 10px; }
.form-note {
  font-size: 11px;
  color: rgba(11,31,46,0.5);
  line-height: 1.5;
  letter-spacing: 0.02em;
}

.modal-sent {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100%;
  min-height: 360px;
  text-align: center;
  gap: 24px;
}
.modal-check {
  color: var(--emerald);
  animation: pop 0.4s ease;
}
.check-path {
  stroke-dasharray: 50;
  stroke-dashoffset: 50;
  animation: drawCheck 0.6s 0.2s ease forwards;
}
@keyframes drawCheck { to { stroke-dashoffset: 0; } }
@keyframes pop { from { transform: scale(0.6); opacity: 0; } to { transform: scale(1); opacity: 1; } }

.modal-confirm {
  font-family: var(--serif);
  font-size: 24px;
  font-weight: 300;
  line-height: 1.3;
  max-width: 360px;
  color: var(--ink);
}
.modal-ref {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.18em;
  color: var(--gold);
}

@media (max-width: 760px) {
  .modal-shell { grid-template-columns: 1fr; max-height: 96vh; }
  .modal-side { padding: 32px 24px; gap: 20px; }
  .modal-form-wrap { padding: 32px 24px; }
  .modal-form .form-row, .form-cta { grid-template-columns: 1fr; }
  .modal-title { font-size: 28px; }
}

/* ====================================================================
   v3 — Hero Dossier + extra fluid motion
   ==================================================================== */

.hero-grid {
  grid-template-columns: 1fr 1fr;
  gap: 80px;
}

.hero-dossier-wrap {
  display: flex;
  align-items: center;
  justify-content: flex-end;
  position: relative;
  z-index: 2;
}

.dossier {
  width: 100%;
  max-width: 520px;
  background: linear-gradient(180deg, rgba(255,255,255,0.025) 0%, rgba(255,255,255,0.015) 100%);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 6px;
  padding: 28px 28px 24px;
  backdrop-filter: blur(8px) saturate(1.2);
  -webkit-backdrop-filter: blur(8px) saturate(1.2);
  display: flex;
  flex-direction: column;
  gap: 22px;
  position: relative;
  overflow: hidden;
  animation: dossierIn 1.2s 0.4s cubic-bezier(0.2, 0.8, 0.2, 1) backwards;
  box-shadow: 0 40px 80px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.06);
}

@keyframes dossierIn {
  0% { opacity: 0; transform: translateY(24px) scale(0.98); filter: blur(8px); }
  100% { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
}

.dossier::before {
  content: "";
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
  animation: scanline 5s ease-in-out infinite;
}
@keyframes scanline {
  0% { transform: translateY(0); opacity: 0; }
  10% { opacity: 1; }
  90% { opacity: 1; }
  100% { transform: translateY(380px); opacity: 0; }
}

.dossier-head {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  padding-bottom: 16px;
  border-bottom: 1px solid rgba(255,255,255,0.08);
}

.dossier-stamp {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.55);
}
.dossier-stamp .stamp-num {
  color: var(--gold);
  margin-top: 4px;
  font-size: 11px;
  letter-spacing: 0.28em;
}

.dossier-live {
  display: flex;
  align-items: center;
  gap: 8px;
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.24em;
  color: rgba(255,255,255,0.55);
  text-transform: uppercase;
}
.dossier-live .pulse {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: #4ade80;
  box-shadow: 0 0 8px #4ade80;
  animation: livePulse 1.6s ease-in-out infinite;
}
@keyframes livePulse {
  0%, 100% { transform: scale(1); opacity: 1; }
  50% { transform: scale(1.4); opacity: 0.6; }
}

.dossier-block { display: flex; flex-direction: column; gap: 10px; }

.dossier-label {
  font-size: 10px;
  letter-spacing: 0.28em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.45);
  font-weight: 600;
}

/* Ticker — rotating editions list */
.ticker {
  position: relative;
  height: 28px;
  overflow: hidden;
}
.ticker-row {
  position: absolute;
  inset: 0;
  display: grid;
  grid-template-columns: 92px 1fr auto;
  align-items: center;
  gap: 14px;
  opacity: 0;
  transform: translateY(20px);
  transition: opacity 0.6s ease, transform 0.6s cubic-bezier(0.2, 0.8, 0.2, 1);
}
.ticker-row.on {
  opacity: 1;
  transform: translateY(0);
}
.ticker .t-code {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.18em;
  color: var(--gold);
}
.ticker .t-name {
  font-family: var(--serif);
  font-size: 22px;
  font-weight: 300;
  line-height: 1;
}
.ticker .t-cat {
  font-size: 9px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.5);
  padding: 4px 8px;
  border: 1px solid rgba(255,255,255,0.18);
  border-radius: 999px;
}

/* Mineral analysis bars */
.mineral-grid {
  display: flex;
  flex-direction: column;
  gap: 9px;
}
.mineral-row {
  opacity: 0;
  transform: translateY(8px);
  animation: minIn 0.6s ease forwards;
}
@keyframes minIn { to { opacity: 1; transform: translateY(0); } }

.m-head {
  display: grid;
  grid-template-columns: 56px 1fr auto;
  align-items: baseline;
  gap: 12px;
  font-size: 12px;
  color: rgba(255,255,255,0.85);
  margin-bottom: 4px;
}
.m-sym {
  font-family: var(--serif);
  font-style: italic;
  color: var(--gold);
  font-size: 14px;
}
.m-name {
  color: rgba(255,255,255,0.6);
  font-size: 11px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
}
.m-val {
  font-family: var(--mono);
  font-size: 12px;
  color: #fff;
  letter-spacing: 0.04em;
}
.m-val small {
  color: rgba(255,255,255,0.45);
  margin-left: 4px;
  font-size: 10px;
  letter-spacing: 0.08em;
}

.m-bar {
  height: 2px;
  background: rgba(255,255,255,0.06);
  position: relative;
  overflow: hidden;
}
.m-fill {
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 0;
  background: linear-gradient(90deg, var(--gold), rgba(225,245,238,0.7));
  animation: barFill 1.4s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
}
@keyframes barFill {
  from { width: 0; }
  to { width: var(--w); }
}

.mineral-foot {
  font-size: 11px;
  color: rgba(255,255,255,0.45);
  line-height: 1.5;
  padding-top: 4px;
  border-top: 1px dashed rgba(255,255,255,0.1);
  margin-top: 6px;
}

/* Countdown */
.dossier-foot {
  padding-top: 16px;
  border-top: 1px solid rgba(255,255,255,0.08);
}
.cd-label {
  font-size: 10px;
  letter-spacing: 0.24em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.5);
  margin-bottom: 10px;
}
.cd-grid {
  display: flex;
  align-items: baseline;
  gap: 8px;
  font-family: var(--serif);
}
.cd-u {
  display: flex;
  flex-direction: column;
  align-items: center;
  min-width: 56px;
  padding: 8px 4px;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 2px;
}
.cd-u span {
  font-size: 28px;
  font-weight: 300;
  letter-spacing: 0.04em;
  color: #fff;
  line-height: 1;
  font-variant-numeric: tabular-nums;
}
.cd-u small {
  margin-top: 4px;
  font-family: var(--sans);
  font-size: 9px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--gold);
}
.cd-sep {
  font-family: var(--mono);
  color: rgba(255,255,255,0.3);
  font-size: 22px;
  align-self: center;
  padding-bottom: 16px;
}

@media (max-width: 1000px) {
  .hero-grid { grid-template-columns: 1fr; gap: 48px; padding-top: 120px; }
  .hero-dossier-wrap { justify-content: center; }
  .dossier { max-width: none; }
  .cd-u { min-width: 48px; }
  .cd-u span { font-size: 24px; }
}

/* Refined gamme price area */
.gamme .price {
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.price-tag {
  font-family: var(--serif);
  font-size: 18px;
  font-weight: 400;
  font-style: italic;
  color: var(--gold);
  line-height: 1;
}
.gamme .price small {
  font-family: var(--sans);
  font-size: 10px;
  letter-spacing: 0.16em;
  color: rgba(255,255,255,0.45);
  text-transform: uppercase;
}

/* Smoother global section reveal */
.reveal {
  transition: opacity 1.1s cubic-bezier(0.2, 0.7, 0.2, 1), transform 1.1s cubic-bezier(0.2, 0.7, 0.2, 1);
}

/* Marquee glide */
.niger-marquee {
  animation: marqueeGlide 30s linear infinite;
}
@keyframes marqueeGlide {
  0% { transform: translateX(0); }
  100% { transform: translateX(-30%); }
}

/* Section head underline draw */
.section-head h2 {
  position: relative;
}
.section-head h2::after {
  content: "";
  display: block;
  width: 0;
  height: 1px;
  background: var(--gold);
  margin-top: 24px;
  transition: width 1.2s 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
}
.reveal.in .section-head h2::after,
section .section-head h2.in::after { width: 80px; }

/* Better stat number entrance */
.stat .num { animation: numFloat 1.4s ease backwards; }
.stat:nth-child(1) .num { animation-delay: 0.1s; }
.stat:nth-child(2) .num { animation-delay: 0.2s; }
.stat:nth-child(3) .num { animation-delay: 0.3s; }
.stat:nth-child(4) .num { animation-delay: 0.4s; }
@keyframes numFloat {
  from { opacity: 0; transform: translateY(16px); letter-spacing: 0.04em; }
  to   { opacity: 1; transform: translateY(0); letter-spacing: -0.02em; }
}

/* Chapter row hover */
.chapter {
  transition: background 0.3s ease, padding 0.3s ease;
  cursor: default;
}
.chapter:hover {
  background: rgba(255,255,255,0.02);
  padding-left: 16px;
  padding-right: 16px;
}
.chapter .num {
  transition: color 0.3s, letter-spacing 0.3s;
}
.chapter:hover .num {
  color: #fff;
  letter-spacing: 0.32em;
}

/* Smooth tab indicator */
.inst-tab {
  position: relative;
}
.inst-tab::before {
  content: "";
  position: absolute;
  bottom: -2px;
  left: 50%;
  width: 0;
  height: 2px;
  background: var(--gold);
  transition: width 0.4s cubic-bezier(0.2, 0.8, 0.2, 1), left 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
}
.inst-tab:hover::before { width: 80%; left: 10%; }

/* CTA button shimmer */
.btn-pill.gold {
  position: relative;
  overflow: hidden;
}
.btn-pill.gold::before {
  content: "";
  position: absolute;
  top: 0; left: -100%;
  width: 60%; height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
  transition: left 0.6s ease;
}
.btn-pill.gold:hover::before { left: 120%; }

/* ====================================================================
   v4 — Territoire map + luxe motion
   ==================================================================== */

.niger { background: #050b14; color: #fff; }
.niger .section-head h2 { color: #fff; }
.niger .section-head .right { color: rgba(255,255,255,0.6); }
.niger-marquee {
  color: rgba(255,255,255,0.85);
  opacity: 0.85;
  font-size: clamp(64px, 10vw, 140px);
}
.niger-marquee em { color: var(--gold); }

.territoire {
  display: grid;
  grid-template-columns: 1.4fr 1fr;
  gap: 32px;
  margin-top: 32px;
}

/* ---- Map ---- */
.terr-map {
  position: relative;
  aspect-ratio: 16 / 11;
  background:
    radial-gradient(ellipse at 40% 50%, rgba(184,134,11,0.07), transparent 60%),
    linear-gradient(180deg, #061320 0%, #03080f 100%);
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: 6px;
  overflow: hidden;
}

.terr-grid {
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px);
  background-size: 8.33% 9.09%;
  animation: gridDrift 22s linear infinite;
}
@keyframes gridDrift {
  0% { background-position: 0 0; }
  100% { background-position: 50px 50px; }
}

.terr-axis-y, .terr-axis-x {
  position: absolute;
  background: linear-gradient(var(--gold), transparent);
  opacity: 0.2;
}
.terr-axis-y { left: 18%; top: 0; bottom: 0; width: 1px; }
.terr-axis-x { left: 0; right: 0; top: 60%; height: 1px;
  background: linear-gradient(90deg, transparent, rgba(184,134,11,0.4), transparent);
}

.terr-corner {
  position: absolute;
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 0.24em;
  color: rgba(255,255,255,0.4);
  padding: 6px 10px;
}
.terr-corner.tl { top: 10px; left: 10px; }
.terr-corner.tr { top: 10px; right: 10px; }
.terr-corner.bl { bottom: 10px; left: 10px; }
.terr-corner.br { bottom: 10px; right: 10px; color: var(--gold); }

.terr-svg {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  overflow: visible;
}

.src-halo {
  animation: srcHalo 3s ease-in-out infinite;
  transform-origin: center;
  transform-box: fill-box;
}
@keyframes srcHalo {
  0%, 100% { opacity: 0.5; transform: scale(0.8); }
  50% { opacity: 1; transform: scale(1.4); }
}

.terr-node {
  position: absolute;
  transform: translate(-50%, -50%);
  background: none;
  border: none;
  padding: 0;
  cursor: pointer;
  z-index: 3;
  color: #fff;
}

.terr-node .dot {
  display: block;
  width: 10px; height: 10px;
  background: #fff;
  border-radius: 50%;
  box-shadow: 0 0 12px rgba(255,255,255,0.4);
  transition: all 0.3s;
}
.terr-node.source .dot {
  width: 16px; height: 16px;
  background: var(--gold);
  box-shadow: 0 0 20px var(--gold), 0 0 40px rgba(184,134,11,0.4);
}
.terr-node.hub .dot {
  background: var(--emerald-2);
  box-shadow: 0 0 16px rgba(15,110,86,0.6);
}

.terr-node .ring, .terr-node .ring.r2 {
  position: absolute;
  inset: -8px;
  border-radius: 50%;
  border: 1px solid rgba(255,255,255,0.3);
  opacity: 0;
}
.terr-node.active .ring {
  opacity: 1;
  animation: nodePulse 2s ease-out infinite;
}
.terr-node.source .ring { border-color: var(--gold); animation: nodePulse 2s ease-out infinite; opacity: 1; }
.terr-node.source .ring.r2 { animation-delay: 1s; opacity: 1; }

@keyframes nodePulse {
  0% { transform: scale(0.6); opacity: 0.8; }
  100% { transform: scale(2.4); opacity: 0; }
}

.terr-node:hover .dot { transform: scale(1.3); }

.terr-node .lbl {
  position: absolute;
  top: 18px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 11px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  font-weight: 600;
  color: #fff;
  white-space: nowrap;
  text-shadow: 0 1px 4px rgba(0,0,0,0.8);
  transition: color 0.25s;
}
.terr-node.active .lbl, .terr-node:hover .lbl { color: var(--gold); }

.terr-node .tag {
  position: absolute;
  bottom: 18px;
  left: 50%;
  transform: translateX(-50%);
  font-family: var(--mono);
  font-size: 8px;
  letter-spacing: 0.28em;
  color: var(--gold);
  background: rgba(0,0,0,0.5);
  padding: 3px 6px;
  border: 1px solid rgba(184,134,11,0.4);
  white-space: nowrap;
}

.terr-legend {
  position: absolute;
  bottom: 16px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 22px;
  background: rgba(0,0,0,0.5);
  backdrop-filter: blur(8px);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 999px;
  padding: 8px 18px;
  font-size: 10px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.75);
}
.terr-legend > div { display: flex; align-items: center; gap: 8px; }
.lg-dot { width: 8px; height: 8px; border-radius: 50%; }
.lg-dot.src { background: var(--gold); box-shadow: 0 0 8px var(--gold); }
.lg-dot.hub { background: var(--emerald-2); box-shadow: 0 0 8px rgba(15,110,86,0.6); }
.lg-dot.node { background: #fff; box-shadow: 0 0 6px rgba(255,255,255,0.4); }

/* ---- Side panel ---- */

.terr-panel {
  background: linear-gradient(180deg, rgba(255,255,255,0.04) 0%, rgba(255,255,255,0.015) 100%);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 6px;
  padding: 28px;
  display: flex;
  flex-direction: column;
  gap: 24px;
  position: relative;
  overflow: hidden;
}
.terr-panel::before {
  content: "";
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
}

.tp-stamp {
  display: flex;
  justify-content: space-between;
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.24em;
  color: rgba(255,255,255,0.5);
  text-transform: uppercase;
}
.tp-stamp .tp-code { color: var(--gold); }

.tp-body { animation: bodyIn 0.5s ease; }
@keyframes bodyIn {
  from { opacity: 0; transform: translateX(8px); }
  to   { opacity: 1; transform: translateX(0); }
}

.tp-role {
  font-size: 10px;
  letter-spacing: 0.28em;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 8px;
  font-weight: 600;
}
.tp-name {
  font-family: var(--serif);
  font-weight: 300;
  font-size: 44px;
  line-height: 1;
  letter-spacing: -0.01em;
  margin-bottom: 6px;
}
.tp-stat {
  font-family: var(--serif);
  font-style: italic;
  font-size: 18px;
  color: rgba(225,245,238,0.7);
  margin-bottom: 18px;
}
.tp-note {
  font-size: 13px;
  line-height: 1.55;
  color: rgba(255,255,255,0.7);
  padding-bottom: 18px;
  border-bottom: 1px dashed rgba(255,255,255,0.1);
}

.tp-coords {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 12px;
  padding-top: 12px;
}
.tp-coords > div {
  display: flex;
  flex-direction: column;
  gap: 4px;
  font-size: 11px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
}
.tp-coords > div > span:first-child {
  color: rgba(255,255,255,0.4);
  font-size: 9px;
}
.tp-coords .v {
  font-family: var(--mono);
  color: #fff;
  font-size: 13px;
}
.tp-coords .v.live {
  color: #4ade80;
  display: flex; align-items: center; gap: 6px;
}
.tp-coords .v.live::before {
  content: "";
  width: 6px; height: 6px;
  border-radius: 50%;
  background: #4ade80;
  box-shadow: 0 0 6px #4ade80;
  animation: livePulse 1.6s ease-in-out infinite;
  display: inline-block;
}

.tp-strip {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-top: auto;
  padding-top: 16px;
  border-top: 1px solid rgba(255,255,255,0.06);
}
.tp-pill {
  font-size: 11px;
  padding: 6px 12px;
  background: transparent;
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 999px;
  color: rgba(255,255,255,0.7);
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  gap: 6px;
}
.tp-pill .i {
  font-family: var(--mono);
  font-size: 9px;
  color: var(--gold);
  letter-spacing: 0.1em;
}
.tp-pill:hover { color: #fff; border-color: rgba(255,255,255,0.3); }
.tp-pill.on {
  background: var(--gold);
  color: var(--ink-deep);
  border-color: var(--gold);
}
.tp-pill.on .i { color: var(--ink-deep); }

@media (max-width: 1100px) {
  .territoire { grid-template-columns: 1fr; }
  .terr-map { aspect-ratio: 16 / 12; }
  .tp-name { font-size: 32px; }
}

/* Stat bands at bottom of section */
.terr-bands {
  margin-top: 32px;
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 1px;
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 4px;
  overflow: hidden;
}
.band {
  background: #050b14;
  padding: 32px 28px;
  transition: background 0.4s ease;
  cursor: default;
}
.band:hover { background: #0a1828; }
.band-num {
  font-family: var(--serif);
  font-weight: 300;
  font-size: 64px;
  letter-spacing: -0.02em;
  line-height: 1;
  color: var(--gold);
}
.band-num sup { font-size: 18px; color: rgba(255,255,255,0.55); margin-left: 4px; }
.band-lab {
  margin-top: 10px;
  font-size: 11px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: #fff;
}
.band-sub {
  margin-top: 8px;
  font-size: 13px;
  color: rgba(255,255,255,0.55);
  line-height: 1.5;
}

@media (max-width: 880px) {
  .terr-bands { grid-template-columns: 1fr; }
  .band-num { font-size: 48px; }
}

/* ---- Luxe motion extras ---- */

/* Soft trailing glow that follows the cursor inside a section */
.luxe-glow {
  position: relative;
  isolation: isolate;
}
.luxe-glow::after {
  content: "";
  position: absolute;
  inset: -10%;
  background: radial-gradient(circle at var(--mx, 50%) var(--my, 50%), rgba(184,134,11,0.08), transparent 30%);
  pointer-events: none;
  z-index: -1;
  transition: opacity 0.4s;
}

/* Smooth float reveal on .reveal entries */
@keyframes lift {
  from { transform: translateY(48px); opacity: 0; filter: blur(6px); }
  to   { transform: translateY(0); opacity: 1; filter: blur(0); }
}

/* Make chapter rows entrance staggered */
.chapter.reveal { transition-delay: calc(var(--idx, 0) * 100ms); }

/* Trust stat number entrance shimmer */
.trust-stat .num {
  background: linear-gradient(180deg, var(--gold), #f4d385);
  -webkit-background-clip: text;
          background-clip: text;
  -webkit-text-fill-color: transparent;
  position: relative;
}

/* Subtle hue rotation on partner hover */
.partner {
  position: relative;
}
.partner::after {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, rgba(184,134,11,0.0), rgba(184,134,11,0.12));
  opacity: 0;
  transition: opacity 0.4s ease;
  pointer-events: none;
}
.partner:hover::after { opacity: 1; }

/* Smoother card glare reset */
.gamme, .poster { transition: transform 0.5s cubic-bezier(0.2, 0.7, 0.2, 1); }

/* Loader logo: slight breathing */
.loader .mark { animation: fadeUp 1.2s 0.2s ease forwards, breathe 4s 1.4s ease-in-out infinite; }
@keyframes breathe {
  0%, 100% { letter-spacing: 0.12em; }
  50% { letter-spacing: 0.16em; }
}

/* Nav scroll polish — gold underline trace */
.nav ul a { position: relative; }
.nav ul a::after {
  content: "";
  position: absolute;
  left: 0; bottom: -6px;
  width: 0; height: 1px;
  background: var(--gold);
  transition: width 0.35s cubic-bezier(0.2, 0.8, 0.2, 1);
}
.nav ul a:hover::after { width: 100%; }

/* Concierge button bigger gold ring */
.concierge-btn { transition: transform 0.3s, box-shadow 0.3s; }
.concierge-btn:hover { box-shadow: 0 24px 50px rgba(184,134,11,0.35); }

/* Loading overlay ---------------------------------------------------- */

.loader {
  position: fixed;
  inset: 0;
  background: #03080f;
  color: #fff;
  z-index: 200;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 24px;
  transition: opacity 0.8s ease, visibility 0.8s ease;
}
.loader.gone { opacity: 0; visibility: hidden; pointer-events: none; }

.loader .mark {
  font-family: var(--serif);
  font-weight: 300;
  font-size: 56px;
  letter-spacing: 0.12em;
  position: relative;
  opacity: 0;
  animation: fadeUp 1.2s 0.2s ease forwards;
}
.loader .mark em { color: var(--gold); font-style: italic; }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}

.loader .progress {
  width: 200px;
  height: 1px;
  background: rgba(255,255,255,0.1);
  position: relative;
  overflow: hidden;
}
.loader .progress::after {
  content: "";
  position: absolute;
  left: 0; top: 0; height: 100%;
  width: 0%;
  background: var(--gold);
  animation: load 2s 0.4s ease-out forwards;
}
@keyframes load { to { width: 100%; } }

.loader .sub {
  font-size: 10px;
  letter-spacing: 0.36em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.4);
  opacity: 0;
  animation: fadeUp 1s 0.6s ease forwards;
}


/* ====================================================================
   LiptakoBot — Interactive robot widget (21st.dev style)
   ==================================================================== */

.lbot-wrap {
  position: fixed;
  bottom: 88px;
  right: 24px;
  z-index: 91;
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 10px;
  pointer-events: none;
}

/* Speech bubble */
.lbot-bubble {
  max-width: 220px;
  padding: 12px 16px;
  background: var(--ink);
  border: 1px solid rgba(184,134,11,0.35);
  border-radius: 12px 12px 4px 12px;
  font-size: 13px;
  line-height: 1.5;
  color: rgba(255,255,255,0.88);
  box-shadow: 0 12px 30px rgba(0,0,0,0.4);
  pointer-events: auto;
  transform-origin: bottom right;
  animation: bubblePop 0.35s cubic-bezier(0.2,0.8,0.2,1);
  position: relative;
}
.lbot-bubble em { color: var(--gold); font-style: italic; }
.lbot-bubble .lbot-bubble-dot {
  position: absolute;
  bottom: -6px; right: 16px;
  width: 10px; height: 10px;
  background: var(--ink);
  border-right: 1px solid rgba(184,134,11,0.35);
  border-bottom: 1px solid rgba(184,134,11,0.35);
  transform: rotate(45deg);
}
@keyframes bubblePop {
  from { opacity:0; transform: scale(0.85) translateY(8px); }
  to   { opacity:1; transform: scale(1) translateY(0); }
}

/* Robot container */
.lbot {
  pointer-events: auto;
  cursor: pointer;
  width: 64px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0;
  filter: drop-shadow(0 8px 24px rgba(0,0,0,0.5));
  transition: transform 0.3s cubic-bezier(0.2,0.8,0.2,1);
  transform-origin: bottom center;
}
.lbot:hover { transform: translateY(-4px) scale(1.04); }
.lbot.wave  { animation: botWave 0.6s ease; }
@keyframes botWave {
  0%,100%  { transform: translateY(0) rotate(0deg); }
  25%      { transform: translateY(-6px) rotate(-4deg); }
  75%      { transform: translateY(-4px) rotate(3deg); }
}
.lbot.excited { animation: botBounce 0.5s ease; }
@keyframes botBounce {
  0%,100% { transform: translateY(0) scaleY(1); }
  40%     { transform: translateY(-10px) scaleY(1.05); }
  70%     { transform: translateY(-3px) scaleY(0.97); }
}

/* Antenna */
.lbot-antenna {
  width: 3px; height: 14px;
  background: linear-gradient(to top, var(--gold), #d4a84a);
  border-radius: 2px;
  margin-bottom: -1px;
  position: relative;
}
.lbot-antenna::after {
  content: "";
  position: absolute;
  top: -5px; left: 50%;
  transform: translateX(-50%);
  width: 9px; height: 9px;
  border-radius: 50%;
  background: var(--gold);
  box-shadow: 0 0 8px var(--gold), 0 0 16px rgba(184,134,11,0.6);
  animation: antennaPulse 2.2s ease-in-out infinite;
}
@keyframes antennaPulse {
  0%,100% { box-shadow: 0 0 6px var(--gold), 0 0 12px rgba(184,134,11,0.5); transform: translateX(-50%) scale(1); }
  50%     { box-shadow: 0 0 14px var(--gold), 0 0 28px rgba(184,134,11,0.8); transform: translateX(-50%) scale(1.25); }
}

/* Head */
.lbot-head {
  width: 56px; height: 46px;
  background: linear-gradient(160deg, #1a3550 0%, #0d2238 60%, #081726 100%);
  border: 1.5px solid rgba(184,134,11,0.45);
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 9px;
  position: relative;
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.06);
  overflow: visible;
}

/* Ears */
.lbot-head::before,
.lbot-head::after {
  content: "";
  position: absolute;
  top: 50%; transform: translateY(-50%);
  width: 6px; height: 18px;
  background: linear-gradient(180deg, #1a3550, #0d2238);
  border: 1.5px solid rgba(184,134,11,0.3);
  border-radius: 3px;
}
.lbot-head::before { left: -7px; }
.lbot-head::after  { right: -7px; }

/* Eyes */
.lbot-eye {
  width: 18px; height: 18px;
  background: linear-gradient(180deg, #0a1f30, #050b14);
  border-radius: 50%;
  border: 1.5px solid rgba(184,134,11,0.5);
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
  box-shadow: 0 0 8px rgba(184,134,11,0.2) inset;
}
.lbot-eye .lbot-pupil {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: radial-gradient(circle at 35% 35%, #4fc3f7, #0288d1);
  box-shadow: 0 0 6px rgba(79,195,247,0.8);
  position: absolute;
  transition: transform 0.08s linear;
  will-change: transform;
}
.lbot-eye .lbot-shine {
  position: absolute;
  top: 3px; left: 4px;
  width: 4px; height: 4px;
  border-radius: 50%;
  background: rgba(255,255,255,0.85);
  pointer-events: none;
}

/* Blink animation */
.lbot-eye.blink { animation: eyeBlink 0.15s ease; }
@keyframes eyeBlink {
  0%,100% { transform: scaleY(1); }
  50%     { transform: scaleY(0.08); }
}

/* Mouth / LED strip */
.lbot-mouth {
  position: absolute;
  bottom: 8px;
  left: 50%; transform: translateX(-50%);
  width: 24px; height: 4px;
  background: rgba(0,0,0,0.4);
  border-radius: 2px;
  overflow: hidden;
  border: 1px solid rgba(184,134,11,0.2);
}
.lbot-mouth-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--gold), #4fc3f7, var(--gold));
  background-size: 200% 100%;
  border-radius: 2px;
  animation: mouthGlow 2s linear infinite;
  width: 0%;
  transition: width 0.4s ease;
}
@keyframes mouthGlow {
  0%   { background-position: 0% 0%; }
  100% { background-position: 200% 0%; }
}
.lbot:hover .lbot-mouth-fill,
.lbot.talking .lbot-mouth-fill { width: 100%; }

/* Neck */
.lbot-neck {
  width: 16px; height: 6px;
  background: linear-gradient(180deg, #0d2238, #081726);
  border-left: 1.5px solid rgba(184,134,11,0.3);
  border-right: 1.5px solid rgba(184,134,11,0.3);
}

/* Body */
.lbot-body {
  width: 56px; height: 40px;
  background: linear-gradient(160deg, #1a3550 0%, #0d2238 60%, #081726 100%);
  border: 1.5px solid rgba(184,134,11,0.4);
  border-radius: 10px 10px 8px 8px;
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.05);
}

/* Chest panel */
.lbot-chest {
  width: 28px; height: 18px;
  background: rgba(0,0,0,0.4);
  border-radius: 4px;
  border: 1px solid rgba(184,134,11,0.25);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 4px;
}
.lbot-led {
  width: 5px; height: 5px;
  border-radius: 50%;
  animation: ledCycle 3s ease-in-out infinite;
}
.lbot-led:nth-child(1) { background: var(--gold);     box-shadow: 0 0 4px var(--gold);     animation-delay: 0s; }
.lbot-led:nth-child(2) { background: #4fc3f7;          box-shadow: 0 0 4px #4fc3f7;          animation-delay: 0.5s; }
.lbot-led:nth-child(3) { background: #4ade80;          box-shadow: 0 0 4px #4ade80;          animation-delay: 1s; }
@keyframes ledCycle {
  0%,100%  { opacity: 1; transform: scale(1); }
  50%      { opacity: 0.3; transform: scale(0.7); }
}

/* Arms */
.lbot-arms {
  position: absolute;
  top: 4px;
  left: -10px; right: -10px;
  display: flex;
  justify-content: space-between;
  pointer-events: none;
}
.lbot-arm {
  width: 8px; height: 26px;
  background: linear-gradient(180deg, #1a3550, #081726);
  border: 1.5px solid rgba(184,134,11,0.3);
  border-radius: 4px;
}
.lbot-arm.left  { transform-origin: top center; animation: armSwayL 4s ease-in-out infinite; }
.lbot-arm.right { transform-origin: top center; animation: armSwayR 4s ease-in-out infinite; }
@keyframes armSwayL {
  0%,100% { transform: rotate(-4deg); }
  50%     { transform: rotate(4deg); }
}
@keyframes armSwayR {
  0%,100% { transform: rotate(4deg); }
  50%     { transform: rotate(-4deg); }
}
.lbot:hover .lbot-arm.left  { animation: armWaveL 0.5s ease infinite; }
.lbot:hover .lbot-arm.right { animation: armWaveR 0.5s ease infinite; }
@keyframes armWaveL { 0%,100%{transform:rotate(-20deg)} 50%{transform:rotate(10deg)} }
@keyframes armWaveR { 0%,100%{transform:rotate(20deg)}  50%{transform:rotate(-10deg)} }

/* Legs */
.lbot-legs {
  display: flex;
  gap: 8px;
  margin-top: -2px;
}
.lbot-leg {
  width: 14px; height: 12px;
  background: linear-gradient(180deg, #0d2238, #050b14);
  border: 1.5px solid rgba(184,134,11,0.3);
  border-radius: 0 0 5px 5px;
  animation: legBob 2s ease-in-out infinite;
}
.lbot-leg:nth-child(2) { animation-delay: 0.3s; }
@keyframes legBob {
  0%,100% { transform: translateY(0); }
  50%     { transform: translateY(2px); }
}

// Cross-cutting interactions: modal bus, tilt, magnetic, scroll progress
const { useState: uS, useEffect: uE, useRef: uR, useCallback: uC } = React;

// ---- Event bus: any button can open the modal --------------------------
function openModal(mode = "sample", prefill = {}) {
  window.dispatchEvent(new CustomEvent("liptako:open-modal", { detail: { mode, prefill } }));
}
function closeModal() {
  window.dispatchEvent(new CustomEvent("liptako:close-modal"));

// ---- 3D tilt hook ------------------------------------------------------
function useTilt({ max = 10, scale = 1.02, glare = true } = {}) {
  const ref = uR(null);
  uE(() => {
    const el = ref.current;
    if (!el) return;
    let raf = 0;
    let rect = null;
    const update = () => { rect = el.getBoundingClientRect(); };
    update();
    const ro = new ResizeObserver(update);
    ro.observe(el);
    window.addEventListener("scroll", update, { passive: true });
    window.addEventListener("resize", update);

    function onMove(e) {
      if (!rect) update();
      const cx = rect.left + rect.width / 2;
      const cy = rect.top + rect.height / 2;
      const dx = (e.clientX - cx) / (rect.width / 2);
      const dy = (e.clientY - cy) / (rect.height / 2);
      const rx = (-dy * max).toFixed(2);
      const ry = (dx * max).toFixed(2);
      cancelAnimationFrame(raf);
      raf = requestAnimationFrame(() => {
        el.style.transform = `perspective(1200px) rotateX(${rx}deg) rotateY(${ry}deg) scale(${scale})`;
        if (glare) {
          const gx = ((e.clientX - rect.left) / rect.width) * 100;
          const gy = ((e.clientY - rect.top) / rect.height) * 100;
          el.style.setProperty("--glare-x", gx + "%");
          el.style.setProperty("--glare-y", gy + "%");
          el.style.setProperty("--glare-o", "0.45");
        }
      });
    }
    function onLeave() {
      cancelAnimationFrame(raf);
      el.style.transform = "perspective(1200px) rotateX(0) rotateY(0) scale(1)";
      el.style.setProperty("--glare-o", "0");
    }
    el.addEventListener("mousemove", onMove);
    el.addEventListener("mouseleave", onLeave);
    return () => {
      el.removeEventListener("mousemove", onMove);
      el.removeEventListener("mouseleave", onLeave);
      ro.disconnect();
      window.removeEventListener("scroll", update);
      window.removeEventListener("resize", update);
      cancelAnimationFrame(raf);
    };
  }, [max, scale, glare]);
  return ref;
}

// ---- Magnetic button hook ---------------------------------------------
function useMagnetic({ strength = 0.35 } = {}) {
  const ref = uR(null);
  uE(() => {
    const el = ref.current;
    if (!el) return;
    function onMove(e) {
      const r = el.getBoundingClientRect();
      const x = e.clientX - (r.left + r.width / 2);
      const y = e.clientY - (r.top + r.height / 2);
      el.style.transform = `translate(${x * strength}px, ${y * strength}px)`;
    }
    function onLeave() { el.style.transform = "translate(0,0)"; }
    el.addEventListener("mousemove", onMove);
    el.addEventListener("mouseleave", onLeave);
    return () => {
      el.removeEventListener("mousemove", onMove);
      el.removeEventListener("mouseleave", onLeave);
    };
  }, [strength]);
  return ref;
}

// ---- Cursor parallax (mouse-driven translate)
function useCursorParallax({ strength = 20 } = {}) {
  const ref = uR(null);
  uE(() => {
    const el = ref.current;
    if (!el) return;
    function onMove(e) {
      const x = (e.clientX / window.innerWidth - 0.5) * strength;
      const y = (e.clientY / window.innerHeight - 0.5) * strength;
      el.style.setProperty("--px", x + "px");
      el.style.setProperty("--py", y + "px");
    }
    window.addEventListener("mousemove", onMove);
    return () => window.removeEventListener("mousemove", onMove);
  }, [strength]);
  return ref;
}

// ---- Scroll progress bar ----------------------------------------------
function ScrollProgress() {
  const [p, setP] = uS(0);
  uE(() => {
    const onScroll = () => {
      const h = document.documentElement;
      const sh = h.scrollHeight - h.clientHeight;
      setP(sh > 0 ? (h.scrollTop / sh) * 100 : 0);
    };
    window.addEventListener("scroll", onScroll, { passive: true });
    onScroll();
    return () => window.removeEventListener("scroll", onScroll);
  }, []);
  return (
    <div className="scroll-progress">
      <div className="scroll-progress-fill" style={{ width: p + "%" }}></div>
    </div>
  );
}

// ---- Custom dot cursor (subtle gold dot) -------------------------------
function CursorDot() {
  const ref = uR(null);
  const ring = uR(null);
  uE(() => {
    if (window.matchMedia("(pointer: coarse)").matches) return;
    const d = ref.current;
    const r = ring.current;
    if (!d || !r) return;
    let mx = 0, my = 0, rx = 0, ry = 0;
    function onMove(e) { mx = e.clientX; my = e.clientY; d.style.transform = `translate(${mx}px, ${my}px)`; }
    let raf;
    function tick() {
      rx += (mx - rx) * 0.12;
      ry += (my - ry) * 0.12;
      r.style.transform = `translate(${rx}px, ${ry}px)`;
      raf = requestAnimationFrame(tick);
    }
    tick();
    window.addEventListener("mousemove", onMove);
    const overEls = document.querySelectorAll("a, button, .swatch, .gamme, .niger-card, .inst-tab");
    overEls.forEach(el => {
      el.addEventListener("mouseenter", () => r.classList.add("hover"));
      el.addEventListener("mouseleave", () => r.classList.remove("hover"));
    });
    return () => {
      window.removeEventListener("mousemove", onMove);
      cancelAnimationFrame(raf);
    };
  }, []);
  return (
    <>
      <div className="cursor-dot" ref={ref}></div>
      <div className="cursor-ring" ref={ring}></div>
    </>
  );
}
