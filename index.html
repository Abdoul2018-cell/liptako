const { useState, useEffect, useRef } = React;

function useScrolled(threshold = 60) {
  const [scrolled, setScrolled] = useState(false);
  useEffect(() => {
    const onScroll = () => setScrolled(window.scrollY > threshold);
    window.addEventListener("scroll", onScroll, { passive: true });
    onScroll();
    return () => window.removeEventListener("scroll", onScroll);
  }, [threshold]);
  return scrolled;
}

function useReveal() {
  useEffect(() => {
    const els = document.querySelectorAll(".reveal");
    const io = new IntersectionObserver((entries) => {
      entries.forEach((e) => {
        if (e.isIntersecting) {
          e.target.classList.add("in");
          io.unobserve(e.target);
        }
      });
    }, { threshold: 0.05, rootMargin: "0px 0px -40px 0px" });
    els.forEach((el) => io.observe(el));
    return () => io.disconnect();
  });
}

function useCountdown(targetDate) {
  const [t, setT] = useState({ d: 0, h: 0, m: 0, s: 0 });
  useEffect(() => {
    const tick = () => {
      const diff = Math.max(0, targetDate - Date.now());
      const d = Math.floor(diff / 86400000);
      const h = Math.floor((diff % 86400000) / 3600000);
      const m = Math.floor((diff % 3600000) / 60000);
      const s = Math.floor((diff % 60000) / 1000);
      setT({ d, h, m, s });
    };
    tick();
    const id = setInterval(tick, 1000);
    return () => clearInterval(id);
  }, [targetDate]);
  return t;
}

const { useState: useState2, useMemo, useRef: useRef2, useEffect: useEffect2 } = React;

function InstitutionalCard({ sector, onZoom }) {
  // 3D tilt on the poster
  const ref = useRef2(null);
  useEffect2(() => {
    const el = ref.current;
    if (!el) return;
    let raf = 0;
    function onMove(e) {
      const r = el.getBoundingClientRect();
      const x = ((e.clientX - r.left) / r.width - 0.5);
      const y = ((e.clientY - r.top) / r.height - 0.5);
      cancelAnimationFrame(raf);
      raf = requestAnimationFrame(() => {
        el.style.transform = `perspective(1400px) rotateY(${x * 7}deg) rotateX(${-y * 5}deg) scale(1.02)`;
        el.style.setProperty("--glare-x", ((e.clientX - r.left) / r.width * 100) + "%");
        el.style.setProperty("--glare-y", ((e.clientY - r.top) / r.height * 100) + "%");
        el.style.setProperty("--glare-o", "0.35");
      });
    }
    function onLeave() {
      cancelAnimationFrame(raf);
      el.style.transform = "perspective(1400px) rotateY(0) rotateX(0) scale(1)";
      el.style.setProperty("--glare-o", "0");
    }
    el.addEventListener("mousemove", onMove);
    el.addEventListener("mouseleave", onLeave);
    return () => {
      el.removeEventListener("mousemove", onMove);
      el.removeEventListener("mouseleave", onLeave);
    };
  }, []);

  return (
    <div className="poster-stage" key={sector.id}>
      <div className="poster" ref={ref} onClick={onZoom}>
        <img src={sector.img} alt={"Édition " + sector.short} />
        <div className="poster-glare"></div>

        <div className="poster-corner tr">{sector.cat.toUpperCase()}</div>
        <div className="poster-corner bl">LIPTAKO ED.</div>

        </button>
      </div>
    </div>
  );
}

function Counter({ to, suffix }) {
  const [v, setV] = useState3(0);
  const ref = useRef3();
  useEffect3(() => {
    const el = ref.current;
    if (!el) return;
    let started = false;
    const io = new IntersectionObserver((entries) => {
      entries.forEach((e) => {
        if (e.isIntersecting && !started) {
          started = true;
          const dur = 1400;
          const start = performance.now();
          const tick = (now) => {
            const t = Math.min(1, (now - start) / dur);
            const eased = 1 - Math.pow(1 - t, 3);
            setV(Math.round(to * eased));
            if (t < 1) requestAnimationFrame(tick);
          };
          requestAnimationFrame(tick);
        }
      });
    }, { threshold: 0.5 });
    io.observe(el);
    return () => io.disconnect();
  }, [to]);
  return <span ref={ref}>{v.toLocaleString("fr-FR")}{suffix ? <sup>{suffix}</sup> : null}</span>;
}

];

function LiptakoBot() {
  const [msgIdx, setMsgIdx]     = useState3(0);
  const [showBubble, setShow]   = useState3(false);
  const [isExcited, setExcited] = useState3(false);
  const [isWaving, setWaving]   = useState3(false);
  const [mouthOpen, setMouth]   = useState3(false);
  const leftEye  = useRef3(null);
  const rightEye = useRef3(null);
  const leftPupil  = useRef3(null);
  const rightPupil = useRef3(null);
  const blinkTimer = useRef3(null);

  // Eyes follow cursor
  useEffect3(() => {
    function movePupil(eyeEl, pupilEl, mx, my) {
      if (!eyeEl || !pupilEl) return;
      const r = eyeEl.getBoundingClientRect();
      const cx = r.left + r.width / 2;
      const cy = r.top + r.height / 2;
      const dx = mx - cx, dy = my - cy;
      const dist = Math.sqrt(dx*dx + dy*dy);
      const max = 4;
      const scale = dist > max ? max / dist : 1;
      pupilEl.style.transform = `translate(${(dx * scale).toFixed(1)}px, ${(dy * scale).toFixed(1)}px)`;
    }
    function onMove(e) {
      movePupil(leftEye.current,  leftPupil.current,  e.clientX, e.clientY);
      movePupil(rightEye.current, rightPupil.current, e.clientX, e.clientY);
    }
    window.addEventListener("mousemove", onMove, { passive: true });
    return () => window.removeEventListener("mousemove", onMove);
  }, []);

  // Random blinking
  useEffect3(() => {
    function scheduleBlink() {
      const delay = 2000 + Math.random() * 3000;
      blinkTimer.current = setTimeout(() => {
        [leftEye.current, rightEye.current].forEach(el => {
          if (!el) return;
          el.classList.add("blink");
          setTimeout(() => el.classList.remove("blink"), 180);
        });
        scheduleBlink();
      }, delay);
    }
    scheduleBlink();
    return () => clearTimeout(blinkTimer.current);
  }, []);

  // Auto-cycle messages while bubble is visible
  useEffect3(() => {
    if (!showBubble) return;
    const id = setInterval(() => {
      setMsgIdx(i => (i + 1) % BOT_MESSAGES.length);
      setExcited(true);
      setMouth(true);
      setTimeout(() => { setExcited(false); setMouth(false); }, 600);
    }, 4500);
    return () => clearInterval(id);
  }, [showBubble]);

  function handleClick() {
    const msg = BOT_MESSAGES[msgIdx];
    if (msg.action === "devis")         { openModal("devis"); return; }
    if (msg.action === "institutional") { document.getElementById("institutional")?.scrollIntoView({ behavior: "smooth" }); return; }
    if (msg.action === "chapters")      { document.getElementById("chapters")?.scrollIntoView({ behavior: "smooth" }); return; }
    if (msg.action === "trust")         { document.getElementById("trust")?.scrollIntoView({ behavior: "smooth" }); return; }
    setShow(v => !v);
    if (!showBubble) {
      setWaving(true);
      setMouth(true);
      setTimeout(() => { setWaving(false); setMouth(false); }, 700);
    }
  }

  const cls = ["lbot", isExcited ? "excited" : "", isWaving ? "wave" : "", mouthOpen ? "talking" : ""].filter(Boolean).join(" ");
  const msg = BOT_MESSAGES[msgIdx];

  return (
    <div className="lbot-wrap">
      {showBubble && (
        <div className="lbot-bubble" onClick={() => { if (msg.action) handleClick(); }}>
          <span dangerouslySetInnerHTML={{ __html: msg.text }} />
          <span className="lbot-bubble-dot"></span>
        </div>
      )}
      <div className={cls} onClick={handleClick} title="Liptako Bot — Cliquez pour interagir">

function SearchK() {
  const [open, setOpen]     = useState3(false);
  const [query, setQuery]   = useState3("");
  const [focused, setFocused] = useState3(0);
  const inputRef = useRef3(null);
  const bodyRef  = useRef3(null);

  // Cmd+K / Ctrl+K global shortcut
  useEffect3(() => {
    function onKey(e) {
      if ((e.metaKey || e.ctrlKey) && e.key === "k") {
        e.preventDefault();
        setOpen(o => !o);
      }
    }
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, []);

  // Focus input when opened
  useEffect3(() => {
    if (open) {
      setQuery(""); setFocused(0);
      setTimeout(() => inputRef.current?.focus(), 50);
      document.body.style.overflow = "hidden";
    } else {
      document.body.style.overflow = "";
    }
  }, [open]);

  // Keyboard navigation inside palette
  useEffect3(() => {
    if (!open) return;
    function onKey(e) {
      if (e.key === "Escape") { setOpen(false); return; }
      if (e.key === "ArrowDown") { e.preventDefault(); setFocused(f => Math.min(f + 1, filtered.length - 1)); }
      if (e.key === "ArrowUp")   { e.preventDefault(); setFocused(f => Math.max(f - 1, 0)); }
      if (e.key === "Enter")     { e.preventDefault(); filtered[focused]?.action(); setOpen(false); }
    }
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [open, focused]);

  // Scroll focused item into view
  useEffect3(() => {
    const el = bodyRef.current?.querySelector(".sk-item.focused");
    el?.scrollIntoView({ block: "nearest" });
  }, [focused]);

  const q = query.trim().toLowerCase();
  const filtered = q
    ? SK_ITEMS.filter(it =>
        it.name.toLowerCase().includes(q) ||
        it.sub.toLowerCase().includes(q) ||
        it.group.toLowerCase().includes(q)
      )
    : SK_ITEMS;

  // Group items
  const groups = filtered.reduce((acc, item) => {
    (acc[item.group] = acc[item.group] || []).push(item);
    return acc;
  }, {});

  function run(item) { item.action(); setOpen(false); }

  if (!open) return (
    <button className="sk-trigger" onClick={() => setOpen(true)} title="Cmd+K">
      <svg className="sk-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.5">
        <circle cx="7" cy="7" r="4.5"/>
        <path d="M11 11l3 3"/>
      </svg>
      <span>Rechercher…</span>
      <kbd>⌘K</kbd>
    </button>
  );

  return (
    <div className="sk-overlay" onClick={e => { if (e.target === e.currentTarget) setOpen(false); }}>
      <div className="sk-shell" role="dialog" aria-modal="true" aria-label="Recherche Liptako">
        <div className="sk-input-row">
          <svg width="18" height="18" viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.5">
            <circle cx="7" cy="7" r="4.5"/><path d="M11 11l3 3"/>
          </svg>
          <input
            ref={inputRef}
            value={query}
            onChange={e => { setQuery(e.target.value); setFocused(0); }}
            placeholder="Rechercher une édition, une gamme, une action…"
            autoComplete="off"
            spellCheck={false}
          />
          <span className="sk-esc">ESC</span>
        </div>

        <div className="sk-body" ref={bodyRef}>
          {filtered.length === 0 ? (
            <div className="sk-empty">
              <p>Aucun résultat pour « {query} »</p>
              <small>Essayez : échantillon · Radisson · devis · Sonidep</small>
            </div>
          ) : (
            Object.entries(groups).map(([grp, items]) => {
              let cursor = 0;
              Object.entries(groups).some(([g, it]) => { if (g === grp) return true; cursor += it.length; return false; });
              return (
                <div key={grp}>
                  <div className="sk-group-label">{grp}</div>
                  {items.map((item, i) => {
                    const idx = cursor + i;
                    return (
                      <button
                        key={item.id}
                        className={"sk-item" + (idx === focused ? " focused" : "")}
                        onClick={() => run(item)}
                        onMouseEnter={() => setFocused(idx)}
                      >
                        <span className={"sk-item-icon " + item.iconCls}>{item.icon}</span>
                        <span className="sk-item-body">
                          <span className="sk-item-name">{item.name}</span>
                          <span className="sk-item-sub">{item.sub}</span>
                        </span>
                        <span className="sk-item-right">
                          <span className={"sk-badge " + item.badge}>{item.badge === "ministry" ? "Ministère" : item.badge === "finance" ? "Finance" : item.badge === "hotel" ? "Hôtellerie" : item.badge === "energy" ? "Énergie" : item.group === "Gammes" ? "Gamme" : item.group === "Navigation" ? "Page" : "Action"}</span>
                          {idx === focused && <span className="sk-enter-hint">↵</span>}
                        </span>
                      </button>
                    );
                  })}
                </div>
              );
            })
          )}
        </div>

        <div className="sk-footer">
          <div className="sk-footer-keys">
            <span><kbd>↑↓</kbd> naviguer</span>
            <span><kbd>↵</kbd> ouvrir</span>
            <span><kbd>ESC</kbd> fermer</span>
          </div>
          <div className="sk-count">{filtered.length} résultat{filtered.length !== 1 ? "s" : ""}</div>
        </div>
      </div>
    </div>
  );
}
